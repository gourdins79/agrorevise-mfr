<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AgroRévise — Grandes cultures</title>
<meta name="description" content="Application de révision en agronomie des grandes cultures, CAP agricole et Bac Pro CGEA.">
<style>
/* ===================== VARIABLES & THEME ===================== */
:root{
  --bg:#f7f5ef;
  --bg-card:#ffffff;
  --bg-card-2:#f0ede3;
  --text:#1f2417;
  --text-muted:#5b6350;
  --primary:#1f6d24;
  --primary-fort:#154f19;
  --primary-clair:#e3f1e0;
  --accent:#c8720f;
  --accent-clair:#fbe8cf;
  --danger:#b3261e;
  --danger-clair:#fbe4e2;
  --success:#1f6d24;
  --success-clair:#e3f1e0;
  --border:#dcd6c6;
  --ombre: 0 2px 10px rgba(31,36,23,0.08);
  --rayon: 16px;
  color-scheme: light;
}
:root[data-theme="dark"]{
  --bg:#12140f;
  --bg-card:#1c2016;
  --bg-card-2:#242a1c;
  --text:#eef0e6;
  --text-muted:#a8ae9c;
  --primary:#6cc36f;
  --primary-fort:#8fdb8f;
  --primary-clair:#233a24;
  --accent:#f0a94e;
  --accent-clair:#3d2f18;
  --danger:#ef6a62;
  --danger-clair:#3a1f1d;
  --success:#6cc36f;
  --success-clair:#1f3320;
  --border:#333a29;
  --ombre: 0 2px 14px rgba(0,0,0,0.4);
  color-scheme: dark;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#12140f; --bg-card:#1c2016; --bg-card-2:#242a1c; --text:#eef0e6; --text-muted:#a8ae9c;
    --primary:#6cc36f; --primary-fort:#8fdb8f; --primary-clair:#233a24; --accent:#f0a94e; --accent-clair:#3d2f18;
    --danger:#ef6a62; --danger-clair:#3a1f1d; --success:#6cc36f; --success-clair:#1f3320; --border:#333a29;
    --ombre: 0 2px 14px rgba(0,0,0,0.4); color-scheme: dark;
  }
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  line-height:1.45;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: 2rem;
}
h1,h2,h3{line-height:1.2;}
button{font-family:inherit;}
.conteneur{
  max-width:720px;
  margin:0 auto;
  padding: 1rem 1rem 3rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
}
.entete-app{
  display:flex; align-items:center; justify-content:space-between;
  padding: .9rem 1rem; max-width:720px; margin:0 auto;
  padding-top: max(.9rem, env(safe-area-inset-top));
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
  position: sticky; top:0; z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.logo-app{display:flex; align-items:center; gap:.5rem; font-weight:800; font-size:1.15rem; color:var(--primary-fort);}
.logo-app .feuille{font-size:1.4rem;}
.btn-icone{
  border:1px solid var(--border); background:var(--bg-card); color:var(--text);
  width:44px; height:44px; border-radius:50%; font-size:1.2rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.btn-icone:hover{ border-color: var(--primary); }

/* ===================== COMPOSANTS GENERIQUES ===================== */
.carte{
  background:var(--bg-card);
  border-radius: var(--rayon);
  box-shadow: var(--ombre);
  padding: 1.1rem;
  border: 1px solid var(--border);
}
.bouton{
  display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
  min-height:48px; padding: .8rem 1.3rem;
  border-radius: 999px; border:none; cursor:pointer;
  font-size:1rem; font-weight:700;
  background: var(--primary); color:#fff;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  width:100%;
}
.bouton:active{ transform: scale(.97); }
.bouton:disabled{ opacity:.45; cursor:not-allowed; }
.bouton.secondaire{
  background: var(--bg-card-2); color:var(--text); border:1px solid var(--border);
}
.bouton.fantome{
  background:transparent; color:var(--primary-fort); border:2px solid var(--primary-clair);
}
.bouton.danger{ background:var(--danger); }
.bouton-petit{ width:auto; min-height:40px; padding:.5rem 1rem; font-size:.9rem; }

.badge-pill{
  display:inline-block; padding:.25rem .7rem; border-radius:999px;
  font-size:.75rem; font-weight:700; background:var(--primary-clair); color:var(--primary-fort);
  white-space:nowrap;
}
.badge-pill.accent{ background:var(--accent-clair); color:var(--accent); }
.badge-pill.gris{ background:var(--bg-card-2); color:var(--text-muted); }

.grille-cultures{
  display:grid; grid-template-columns: repeat(2,1fr); gap:.7rem; margin-top: .8rem;
}
@media(min-width:520px){ .grille-cultures{ grid-template-columns: repeat(3,1fr);} }

.carte-culture{
  background:var(--bg-card); border:2px solid var(--border); border-radius:14px;
  padding:.9rem .6rem; text-align:center; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:.35rem;
  position:relative;
}
.carte-culture .icone{ font-size:1.8rem; }
.carte-culture .nom{ font-size:.85rem; font-weight:700; }
.carte-culture.selectionnee{ border-color: var(--primary); background: var(--primary-clair); }
.carte-culture.indisponible{ opacity:.45; cursor:not-allowed; }
.carte-culture .etiquette-bientot{
  position:absolute; top:-8px; right:-6px; background:var(--accent); color:#fff;
  font-size:.6rem; padding:2px 6px; border-radius:8px; font-weight:700;
}

.segmented{
  display:flex; background:var(--bg-card-2); border-radius:999px; padding:4px; gap:4px;
}
.segmented button{
  flex:1; border:none; background:transparent; padding:.65rem .5rem; border-radius:999px;
  font-weight:700; cursor:pointer; color:var(--text-muted); min-height:44px;
}
.segmented button.actif{ background:var(--primary); color:#fff; }

/* ===================== ECRAN SESSION ===================== */
.barre-progression{
  height:10px; background:var(--bg-card-2); border-radius:999px; overflow:hidden; margin: .6rem 0 .3rem;
}
.barre-progression > div{ height:100%; background:var(--primary); transition: width .3s ease; }
.ligne-infos-session{ display:flex; justify-content:space-between; align-items:center; font-size:.85rem; color:var(--text-muted); }
.streak{ display:flex; align-items:center; gap:.3rem; font-weight:800; color:var(--accent); }
.streak .flamme{ font-size:1.1rem; }

.enonce-question{ font-size:1.15rem; font-weight:700; margin: .9rem 0 1rem; }
.meta-question{ display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.6rem; }

.liste-options{ display:flex; flex-direction:column; gap:.6rem; }
.option-reponse{
  display:flex; align-items:center; gap:.7rem;
  border:2px solid var(--border); border-radius:14px; padding:.8rem .9rem;
  background:var(--bg-card); cursor:pointer; text-align:left; font-size:1rem; color:var(--text);
  min-height:52px;
}
.option-reponse .puce{
  width:26px; height:26px; border-radius:50%; border:2px solid var(--border); flex:0 0 auto;
  display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:800;
}
.option-reponse.multi .puce{ border-radius:6px; }
.option-reponse.selectionnee{ border-color:var(--primary); background:var(--primary-clair); }
.option-reponse.selectionnee .puce{ background:var(--primary); border-color:var(--primary); color:#fff; }
.option-reponse.correcte{ border-color:var(--success); background:var(--success-clair); }
.option-reponse.incorrecte{ border-color:var(--danger); background:var(--danger-clair); }
.option-reponse:disabled, .option-reponse.verrouillee{ cursor:default; }

.vf-boutons{ display:flex; gap:.8rem; }
.vf-boutons button{ flex:1; min-height:64px; font-size:1.05rem; }

.zone-appariement{ display:flex; gap:.6rem; }
.colonne-appariement{ flex:1; display:flex; flex-direction:column; gap:.5rem; }
.item-appariement{
  border:2px solid var(--border); border-radius:12px; padding:.65rem .6rem; background:var(--bg-card);
  cursor:pointer; font-size:.88rem; min-height:48px; display:flex; align-items:center;
}
.item-appariement.selectionnee{ border-color:var(--accent); background:var(--accent-clair); }
.item-appariement.pairee{ border-color:var(--primary); background:var(--primary-clair); opacity:.85; }
.item-appariement.correcte{ border-color:var(--success); background:var(--success-clair); }
.item-appariement.incorrecte{ border-color:var(--danger); background:var(--danger-clair); }

.liste-ordre{ display:flex; flex-direction:column; gap:.5rem; }
.item-ordre{
  display:flex; align-items:center; gap:.7rem;
  border:2px solid var(--border); border-radius:12px; padding:.7rem .8rem; background:var(--bg-card);
  cursor:pointer; font-size:.95rem; min-height:50px;
}
.item-ordre .rang{
  width:28px; height:28px; border-radius:50%; background:var(--bg-card-2); color:var(--text-muted);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.85rem; flex:0 0 auto;
}
.item-ordre.choisie .rang{ background:var(--primary); color:#fff; }
.item-ordre.choisie{ border-color:var(--primary); }
.item-ordre.correcte{ border-color:var(--success); background:var(--success-clair); }
.item-ordre.incorrecte{ border-color:var(--danger); background:var(--danger-clair); }

.zone-feedback{
  margin-top:1rem; padding:1rem; border-radius:14px; border:2px solid var(--border);
  animation: apparition .25s ease;
}
.zone-feedback.ok{ border-color:var(--success); background:var(--success-clair); }
.zone-feedback.ko{ border-color:var(--danger); background:var(--danger-clair); }
.zone-feedback .titre-feedback{ font-weight:800; font-size:1.05rem; margin-bottom:.3rem; display:flex; align-items:center; gap:.4rem;}
.zone-feedback .explication{ font-size:.92rem; color:var(--text); margin-top:.4rem; }
.zone-feedback .capacite-travaillee{ margin-top:.6rem; font-size:.78rem; color:var(--text-muted); }

@keyframes apparition{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
@keyframes pulseCorrect{ 0%{transform:scale(1);} 40%{transform:scale(1.06);} 100%{transform:scale(1);} }
.pulse-ok{ animation: pulseCorrect .35s ease; }

.confettis{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
.confetti{ position:absolute; top:-10px; font-size:1.4rem; animation: tomber 1.5s linear forwards; }
@keyframes tomber{ to{ transform: translateY(110vh) rotate(360deg); opacity:.2; } }

.barre-actions-bas{
  position: sticky; bottom:0; background: linear-gradient(to top, var(--bg) 65%, transparent);
  padding: 1rem 0 max(.3rem, env(safe-area-inset-bottom)); margin-top:1rem;
}

/* ===================== ECRAN RESULTATS / STATS ===================== */
.gros-score{ font-size:3rem; font-weight:900; text-align:center; color:var(--primary-fort); }
.sous-score{ text-align:center; color:var(--text-muted); margin-bottom:1rem; }
.grille-badges{ display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:.7rem; margin-top:.8rem; }
.badge-medaille{ text-align:center; font-size:.75rem; color:var(--text-muted); }
.badge-medaille .cercle{
  width:56px; height:56px; border-radius:50%; margin:0 auto .3rem; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; background:var(--bg-card-2); border:2px solid var(--border);
}
.badge-medaille.or .cercle{ background:#fff4d6; border-color:#e0ac16; }
.badge-medaille.argent .cercle{ background:#eef0f2; border-color:#9aa3ad; }
.badge-medaille.bronze .cercle{ background:#f5e0cf; border-color:#c98a4b; }

.ligne-stat{ display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); gap:.6rem; }
.ligne-stat:last-child{ border-bottom:none; }
.mini-barre{ flex:1; height:8px; background:var(--bg-card-2); border-radius:999px; overflow:hidden; margin:0 .6rem; }
.mini-barre>div{ height:100%; background:var(--primary); }

.vide-etat{ text-align:center; color:var(--text-muted); padding:2rem 1rem; }

.onglets{ display:flex; gap:.4rem; margin-bottom:1rem; overflow-x:auto; }
.onglets button{
  border:1px solid var(--border); background:var(--bg-card); color:var(--text-muted); padding:.5rem 1rem;
  border-radius:999px; font-weight:700; cursor:pointer; white-space:nowrap; min-height:40px;
}
.onglets button.actif{ background:var(--primary); color:#fff; border-color:var(--primary); }

.chips-types{ display:flex; gap:.4rem; flex-wrap:wrap; }
.chip-type{
  border:1px solid var(--border); background:var(--bg-card); color:var(--text-muted); padding:.5rem .9rem;
  border-radius:999px; font-weight:700; cursor:pointer; white-space:nowrap; min-height:40px; font-size:.85rem;
}
.chip-type.actif{ background:var(--primary); color:#fff; border-color:var(--primary); }

.entete-section{ display:flex; justify-content:space-between; align-items:center; margin: 1.1rem 0 .4rem; }
.entete-section h2{ font-size:1.05rem; margin:0; }

.toast{
  position:fixed; left:50%; bottom:1.2rem; transform:translateX(-50%);
  background: var(--text); color: var(--bg); padding:.8rem 1.1rem; border-radius:12px;
  font-size:.9rem; max-width:90vw; box-shadow: var(--ombre); z-index:100;
  animation: apparition .25s ease;
}

.texte-muet{ color:var(--text-muted); font-size:.88rem; }
.centre{ text-align:center; }
a{ color: var(--primary-fort); }
.cache{ display:none !important; }
</style>
</head>
<body>

<header class="entete-app">
  <div class="logo-app"><span class="feuille">🌱</span> AgroRévise</div>
  <div style="display:flex; gap:.5rem;">
    <button class="btn-icone cache" id="btn-quitter" title="Quitter la session et revenir à l'accueil" aria-label="Quitter la session et revenir à l'accueil" onclick="quitterSession()">✕</button>
    <button class="btn-icone" id="btn-theme" title="Changer de thème" aria-label="Changer de thème">🌙</button>
  </div>
</header>

<main class="conteneur" id="app"></main>

<div id="zone-confettis" class="confettis"></div>

<script>
"use strict";

/* =====================================================================
   1. RÉFÉRENTIELS & CULTURES
   ===================================================================== */
const REFERENTIEL = {
  CAP: {
    label: "CAP agricole Métiers de l'Agriculture — option Grandes cultures",
    capacites: {
      CP4: "CP4 – Réaliser les travaux de mise en place des cultures",
      CP5: "CP5 – Réaliser les travaux d'entretien et de protection des cultures",
      CP6: "CP6 – Réaliser les travaux de récolte et de valorisation des produits"
    }
  },
  BACPRO: {
    label: "Bac Pro CGEA (Conduite et Gestion de l'Exploitation Agricole)",
    capacites: {
      MP4: "MP4 – Conduite de processus de production dans l'entreprise agricole",
      MP5: "MP5 – Agronomie et agroécologie"
    }
  }
};

// Cultures couvertes par une banque de questions dans cette version
const CULTURES_DISPONIBLES = ["ble-tendre", "colza", "mais", "orge"];

const CULTURES = [
  { slug:"ble-tendre",         nom:"Blé tendre",         icone:"🌾" },
  { slug:"colza",               nom:"Colza",               icone:"🌼" },
  { slug:"mais",                 nom:"Maïs",                 icone:"🌽" },
  { slug:"orge",                 nom:"Orge",                 icone:"🌾" },
  { slug:"ble-dur",             nom:"Blé dur",             icone:"🍝" },
  { slug:"tournesol",           nom:"Tournesol",           icone:"🌻" },
  { slug:"pois-chiche",         nom:"Pois chiche",         icone:"🫘" },
  { slug:"pois-proteagineux",   nom:"Pois protéagineux",   icone:"🫛" },
  { slug:"chanvre",             nom:"Chanvre",             icone:"🌿" },
  { slug:"lin",                   nom:"Lin",                   icone:"💠" },
  { slug:"betterave-sucriere", nom:"Betterave sucrière", icone:"🟠" }
];

function nomCulture(slug){ const c = CULTURES.find(c=>c.slug===slug); return c ? c.nom : slug; }

/* =====================================================================
   2. BANQUE DE QUESTIONS
   Structure : { id, niveau, culture, capacite_referentiel, type, difficulte,
                 enonce, ...champs spécifiques au type, feedback_ok, feedback_ko, explication }
   Types : qcm_unique | qcm_multiple | appariement | vrai_faux | ordre_chrono
   ===================================================================== */
const QUESTION_BANK = [
  // ===== BLÉ TENDRE — CAP agricole MA =====
  { id:"BT-CAP-01", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP4", type:"qcm_unique", difficulte:"facile",
    enonce:"À quelle famille botanique appartient le blé tendre ?",
    options:["Poacées (Graminées)","Fabacées (Légumineuses)","Brassicacées (Crucifères)","Astéracées (Composées)"],
    reponseCorrecte:0, feedback_ok:"Bien vu !", feedback_ko:"Pas tout à fait, regarde l'explication.",
    explication:"Le blé tendre (Triticum aestivum) appartient à la famille des Poacées, comme l'orge, le maïs ou l'avoine." },
  { id:"BT-CAP-02", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP4", type:"qcm_unique", difficulte:"moyen",
    enonce:"Comment qualifie-t-on le mode de reproduction du blé tendre ?",
    options:["Autogame (autofécondation dominante)","Allogame stricte","Reproduction végétative uniquement","Reproduction par bouturage"],
    reponseCorrecte:0, feedback_ok:"Exact, tu maîtrises !", feedback_ko:"Presque ! Relis l'explication pour ancrer le point.",
    explication:"Le blé tendre est une espèce autogame : la fécondation se fait majoritairement à l'intérieur de la même fleur, avant même l'ouverture de l'épillet." },
  { id:"BT-CAP-03", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP5", type:"qcm_unique", difficulte:"facile",
    enonce:"Quel stade du blé correspond à la sortie complète de l'épi hors de la gaine de la dernière feuille ?",
    options:["L'épiaison","Le tallage","La levée","La maturité laiteuse"],
    reponseCorrecte:0, feedback_ok:"Dans le mille !", feedback_ko:"Ce n'est pas ça, mais tu progresses.",
    explication:"L'épiaison désigne le moment où l'épi émerge visiblement de la gaine foliaire supérieure." },
  { id:"BT-CAP-04", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP6", type:"qcm_unique", difficulte:"moyen",
    enonce:"À quoi sert principalement le blé tendre après récolte ?",
    options:["À la fabrication de farine panifiable","À la fabrication de semoule et de pâtes alimentaires","Exclusivement à l'alimentation du bétail","À la production d'huile alimentaire"],
    reponseCorrecte:0, feedback_ok:"Parfaitement juste !", feedback_ko:"Attention à la confusion, voici pourquoi.",
    explication:"Le blé tendre est la céréale de base de la meunerie : sa farine sert à la panification. Le blé dur, plus riche en gluten dur, est lui utilisé pour les semoules et pâtes." },
  { id:"BT-CAP-05", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP5", type:"qcm_unique", difficulte:"moyen",
    enonce:"Quel ravageur est le principal vecteur de virus (comme la jaunisse nanisante de l'orge) sur céréales à l'automne ?",
    options:["Le puceron","La limace","Le taupin","Le charançon"],
    reponseCorrecte:0, feedback_ok:"Belle analyse !", feedback_ko:"Petit raté, la suite t'aidera à corriger le tir.",
    explication:"Les pucerons piqueurs-suceurs transmettent des virus comme la JNO en se nourrissant sur les jeunes plantules à l'automne, d'où une surveillance particulière en sortie d'hiver." },
  { id:"BT-CAP-06", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP5", type:"qcm_unique", difficulte:"difficile",
    enonce:"Dans une conduite classique du blé, en combien d'apports l'azote est-il le plus souvent fractionné ?",
    options:["Généralement 2 à 3 apports (tallage, épi 1 cm, dernière feuille)","Toujours en un seul apport unique","Au minimum 6 apports","Jamais fractionné, un seul apport au semis"],
    reponseCorrecte:0, feedback_ok:"C'est ça !", feedback_ko:"Pas cette fois, mais retiens bien ceci.",
    explication:"Le fractionnement en 2 à 3 apports (tallage, redressement/épi 1 cm, dernière feuille) permet de mieux ajuster les apports aux besoins réels de la plante et de limiter les pertes." },

  { id:"BT-CAP-07", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP5", type:"qcm_multiple", difficulte:"moyen",
    enonce:"Parmi ces maladies, lesquelles peuvent affecter le blé tendre ?",
    options:["Rouille jaune","Septoriose","Oïdium","Mildiou de la pomme de terre"],
    reponsesCorrectes:[0,1,2], feedback_ok:"Réponse solide !", feedback_ko:"Erreur classique, pas de souci.",
    explication:"Rouille jaune, septoriose et oïdium sont des maladies fongiques courantes du blé. Le mildiou de la pomme de terre est spécifique à une autre culture (Solanacées)." },
  { id:"BT-CAP-08", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP5", type:"qcm_multiple", difficulte:"moyen",
    enonce:"Quelles sont des adventices fréquemment concurrentes dans une parcelle de blé ?",
    options:["Vulpin","Ray-grass","Gaillet gratteron","Betterave sucrière"],
    reponsesCorrectes:[0,1,2], feedback_ok:"Tu tiens la bonne technique !", feedback_ko:"On y retourne, voici l'explication.",
    explication:"Vulpin, ray-grass et gaillet gratteron sont des adventices classiques des céréales à paille. La betterave sucrière n'est pas une adventice mais une culture." },
  { id:"BT-CAP-09", niveau:"CAP", culture:"ble-tendre", capacite_referentiel:"CP4", type:"qcm_multiple", difficulte:"facile",
    enonce:"Lesquels de ces éléments font partie des stades de développement du blé ?",
    options:["Tallage","Épiaison","Floraison","Tubérisation"],

/* =====================================================================
   3. MOTEUR DE ROTATION & PERSISTANCE (localStorage uniquement)
   ===================================================================== */
const TAILLE_SESSION = 10;

const cleVus     = (niveau,culture) => `agro_vus_${niveau}_${culture}`;
const cleErreurs = (niveau,culture) => `agro_erreurs_${niveau}_${culture}`;
const CLE_STATS  = "agro_stats";
const CLE_THEME  = "agro_theme";
const CLE_PROFIL = "agro_dernier_profil";

function lireJSON(cle, defaut){
  try{ const v = localStorage.getItem(cle); return v ? JSON.parse(v) : defaut; }
  catch(e){ return defaut; }
}
function ecrireJSON(cle, valeur){ localStorage.setItem(cle, JSON.stringify(valeur)); }

function getVus(niveau,culture){ return lireJSON(cleVus(niveau,culture), []); }
function ajouterVu(niveau,culture,id){
  const v = getVus(niveau,culture);
  if(!v.includes(id)){ v.push(id); ecrireJSON(cleVus(niveau,culture), v); }
}
function getErreurs(niveau,culture){ return lireJSON(cleErreurs(niveau,culture), []); }
function ajouterErreur(niveau,culture,id){
  const e = getErreurs(niveau,culture);
  if(!e.includes(id)){ e.push(id); ecrireJSON(cleErreurs(niveau,culture), e); }
}
function retirerErreur(niveau,culture,id){
  const e = getErreurs(niveau,culture).filter(x=>x!==id);
  ecrireJSON(cleErreurs(niveau,culture), e);
}

function getStats(){ return lireJSON(CLE_STATS, {}); }
function majStats(id, estCorrect){
  const s = getStats();
  if(!s[id]) s[id] = { vu:0, correct:0, incorrect:0 };
  s[id].vu++;
  if(estCorrect) s[id].correct++; else s[id].incorrect++;
  ecrireJSON(CLE_STATS, s);
}

function melanger(tableau){
  const a = [...tableau];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function banqueDuCouple(niveau, culture){
  return QUESTION_BANK.filter(q=>q.niveau===niveau && q.culture===culture);
}

function filtrerParTypes(banque, types){
  return (types && types.length) ? banque.filter(q=>types.includes(q.type)) : banque;
}

// Pioche les questions d'une session normale, sans jamais répéter une question
// tant que la banque du couple niveau x culture (limitée aux types choisis) n'est pas épuisée.
function piocherSession(niveau, culture, types, n = TAILLE_SESSION){
  const banque = filtrerParTypes(banqueDuCouple(niveau, culture), types);
  const vus = getVus(niveau, culture);
  let dispo = banque.filter(q=>!vus.includes(q.id));
  let banqueReinitialisee = false;

  if(dispo.length === 0 && banque.length > 0){
    // Ne retire de "vus" que les questions du sous-ensemble filtré, pour ne pas
    // perdre la progression sur les types de questions non sélectionnés ici.
    const idsBanque = new Set(banque.map(q=>q.id));
    ecrireJSON(cleVus(niveau,culture), vus.filter(id=>!idsBanque.has(id)));
    dispo = banque;
    banqueReinitialisee = true;
  }

  const questions = melanger(dispo).slice(0, Math.min(n, dispo.length));
  return { questions, banqueReinitialisee, tailleBanque: banque.length };
}

// Pioche uniquement dans les questions déjà ratées (mode Rattrapage)
function piocherRattrapage(niveau, culture, types, n = TAILLE_SESSION){
  const ids = getErreurs(niveau, culture);
  const banque = filtrerParTypes(banqueDuCouple(niveau, culture), types);
  const questions = melanger(banque.filter(q=>ids.includes(q.id))).slice(0, n);
  return { questions };
}

   5. THEME
   ===================================================================== */
function appliquerTheme(theme){
  if(theme === "clair") document.documentElement.setAttribute("data-theme","light");
  else if(theme === "sombre") document.documentElement.setAttribute("data-theme","dark");
  else document.documentElement.removeAttribute("data-theme");
  document.getElementById("btn-theme").textContent =
    (document.documentElement.getAttribute("data-theme") === "dark") ||
    (!document.documentElement.getAttribute("data-theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)
    ? "☀️" : "🌙";
}
function basculerTheme(){
  const actuel = localStorage.getItem(CLE_THEME) || "auto";
  const estSombreActuellement = document.documentElement.getAttribute("data-theme") === "dark" ||
    (!document.documentElement.hasAttribute("data-theme") && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const nouveau = estSombreActuellement ? "clair" : "sombre";
  localStorage.setItem(CLE_THEME, nouveau);
  appliquerTheme(nouveau);
}
document.getElementById("btn-theme").addEventListener("click", basculerTheme);
appliquerTheme(localStorage.getItem(CLE_THEME) || "auto");

function toggleTypeFiltre(type){
  if(type === "tous"){
    etat.typesFiltre = null;
  } else {
    const actuel = etat.typesFiltre ? [...etat.typesFiltre] : [];

    etat.typesFiltre = actuel.length === 0 ? null : actuel;

  sauvegarderProfil();
  rendre();
}

/* =====================================================================

   ===================================================================== */
function demarrerSession(rattrapage){
  etat.modeRattrapage = rattrapage;
  const resultat = rattrapage
    ? piocherRattrapage(etat.niveau, etat.culture, etat.typesFiltre)
    : piocherSession(etat.niveau, etat.culture, etat.typesFiltre);

  etat.questions = resultat.questions;
  etat.banqueReinitialisee = !!resultat.banqueReinitialisee;
  etat.indexCourant = 0;
  etat.score = 0;
  etat.streak = 0;
  etat.streakMax = 0;
  etat.bonnesReponses = 0;
  etat.reponseValidee = false;
  etat.selection = null;

  if(etat.questions.length === 0){
    etat.vue = "accueil";
    rendre();
    afficherToast(rattrapage ? "Aucune erreur à rattraper pour l'instant, bravo ! 🎉" : "Aucune question disponible pour ce choix.");
    return;
  }

  etat.vue = "session";
  rendre();
  if(etat.banqueReinitialisee){
    afficherToast("🔄 Tu as tout vu, la banque se réinitialise !");
  }
}

/* =====================================================================
   9. ÉCRAN SESSION — question courante
   ===================================================================== */
function questionActuelle(){ return etat.questions[etat.indexCourant]; }

function initialiserSelectionPourQuestion(q){
  if(q.type === "qcm_unique") etat.selection = { choix: null };
  else if(q.type === "qcm_multiple") etat.selection = { choix: [] };
  else if(q.type === "vrai_faux") etat.selection = { choix: null };
  else if(q.type === "appariement") etat.selection = {
    paires: {}, gaucheChoisie: null,
    gaucheOrdre: melanger(q.paires.map((_,i)=>i)),
    droiteOrdre: melanger(q.paires.map((_,i)=>i))
  };
  else if(q.type === "ordre_chrono") etat.selection = {
    ordreAffiche: melanger(q.etapes.map((_,i)=>i)), ordreChoisi: []
  };
}

function rendreSession(){
  const q = questionActuelle();
  if(!etat.selection) initialiserSelectionPourQuestion(q);

  const progression = Math.round((etat.indexCourant / etat.questions.length) * 100);

  app.innerHTML = `
    <div class="ligne-infos-session">
      <span>${nomCulture(q.culture)} · ${q.niveau === "CAP" ? "CAP agricole" : "Bac Pro CGEA"}${etat.modeRattrapage?" · Rattrapage":""}</span>
      <span class="streak"><span class="flamme">🔥</span> ${etat.streak}</span>
    </div>
    <div class="barre-progression"><div style="width:${progression}%"></div></div>
    <div class="texte-muet" style="margin-bottom:.6rem;">Question ${etat.indexCourant+1} / ${etat.questions.length}</div>

    <div class="carte ${etat.reponseValidee ? 'pulse-ok' : ''}">
      <div class="meta-question">
        <span class="badge-pill">${libelleType(q.type)}</span>
        <span class="badge-pill gris">${libelleDifficulte(q.difficulte)}</span>
      </div>
      <div class="enonce-question">${q.enonce}</div>
      <div id="zone-interaction">${rendreInteraction(q)}</div>
      <div id="zone-feedback-container">${etat.reponseValidee ? rendreFeedback(q, estReponseCorrecte(q)) : ""}</div>
    </div>

    <div class="barre-actions-bas">${rendreActions(q)}</div>
  `;
}

function rendreInteraction(q){
  if(q.type === "qcm_unique") return rendreQCM(q, false);
  if(q.type === "qcm_multiple") return rendreQCM(q, true);
  if(q.type === "vrai_faux") return rendreVraiFaux(q);
  if(q.type === "appariement") return rendreAppariement(q);
  if(q.type === "ordre_chrono") return rendreOrdreChrono(q);
  return "";
}

function rendreQCM(q, multiple){
  return `<div class="liste-options">${q.options.map((opt,i)=>{
    let classes = "option-reponse" + (multiple?" multi":"");
    const selectionne = multiple ? etat.selection.choix.includes(i) : etat.selection.choix === i;
    if(selectionne) classes += " selectionnee";
    if(etat.reponseValidee){
      classes += " verrouillee";
      const estCorrecte = multiple ? q.reponsesCorrectes.includes(i) : q.reponseCorrecte === i;
      if(estCorrecte) classes += " correcte";
      else if(selectionne) classes += " incorrecte";
    }
    const puce = selectionne ? (multiple ? "✓" : "●") : "";
    return `<button class="${classes}" ${etat.reponseValidee?"disabled":""}
              onclick="${multiple?`toggleReponseMultiple(${i})`:`choisirReponseUnique(${i})`}">
              <span class="puce">${puce}</span><span>${opt}</span>
            </button>`;
  }).join("")}</div>`;
}
function choisirReponseUnique(i){ if(etat.reponseValidee) return; etat.selection.choix = i; rendre(); }
function toggleReponseMultiple(i){
  if(etat.reponseValidee) return;
  const idx = etat.selection.choix.indexOf(i);
  if(idx>=0) etat.selection.choix.splice(idx,1); else etat.selection.choix.push(i);
  rendre();
}

function rendreVraiFaux(q){
  const choix = etat.selection.choix;
  function classesPour(val){
    if(!etat.reponseValidee) return "bouton" + (choix===val ? "" : " secondaire");
    if(q.reponse === val) return "bouton";
    if(choix === val) return "bouton danger";
    return "bouton secondaire";
  }
  return `<div class="vf-boutons">
    <button class="${classesPour(true)}" ${etat.reponseValidee?"disabled":""} onclick="choisirVraiFaux(true)">✅ Vrai</button>
    <button class="${classesPour(false)}" ${etat.reponseValidee?"disabled":""} onclick="choisirVraiFaux(false)">❌ Faux</button>
  </div>`;
}
function choisirVraiFaux(v){ if(etat.reponseValidee) return; etat.selection.choix = v; rendre(); }

function rendreAppariement(q){
  const sel = etat.selection;
  const gauche = sel.gaucheOrdre.map(i=>{
    const paireeAvec = sel.paires[i];
    let classes = "item-appariement";
    if(sel.gaucheChoisie === i) classes += " selectionnee";
    if(paireeAvec !== undefined) classes += " pairee";
    if(etat.reponseValidee) classes += (paireeAvec === i) ? " correcte" : " incorrecte";
    return `<div class="${classes}" onclick="choisirGaucheAppariement(${i})">${q.paires[i].gauche}</div>`;
  }).join("");

  const inverse = {};
  Object.entries(sel.paires).forEach(([g,d])=>{ inverse[d] = Number(g); });
  const droite = sel.droiteOrdre.map(i=>{
    let classes = "item-appariement";
    const gaucheAssociee = inverse[i];
    if(gaucheAssociee !== undefined) classes += " pairee";
    if(etat.reponseValidee && gaucheAssociee !== undefined) classes += (gaucheAssociee === i) ? " correcte" : " incorrecte";
    return `<div class="${classes}" onclick="choisirDroiteAppariement(${i})">${q.paires[i].droite}</div>`;
  }).join("");

  return `<p class="texte-muet">Touche un élément à gauche puis son correspondant à droite.</p>
          <div class="zone-appariement">
            <div class="colonne-appariement">${gauche}</div>
            <div class="colonne-appariement">${droite}</div>
          </div>`;
}
function choisirGaucheAppariement(i){
  if(etat.reponseValidee) return;
  const sel = etat.selection;
  if(sel.paires[i] !== undefined) delete sel.paires[i];
  sel.gaucheChoisie = (sel.gaucheChoisie === i) ? null : i;
  rendre();
}
function choisirDroiteAppariement(i){
  if(etat.reponseValidee) return;
  const sel = etat.selection;
  if(sel.gaucheChoisie === null) return;
  Object.keys(sel.paires).forEach(g=>{ if(sel.paires[g] === i) delete sel.paires[g]; });
  sel.paires[sel.gaucheChoisie] = i;
  sel.gaucheChoisie = null;
  rendre();
}

function rendreOrdreChrono(q){
  const sel = etat.selection;
  const items = sel.ordreAffiche.map(i=>{
    const rang = sel.ordreChoisi.indexOf(i);
    let classes = "item-ordre";
    if(rang>=0) classes += " choisie";
    if(etat.reponseValidee) classes += (rang === i) ? " correcte" : " incorrecte";
    return `<div class="${classes}" onclick="toggleEtapeOrdre(${i})">
              <span class="rang">${rang>=0 ? rang+1 : "–"}</span>
              <span>${q.etapes[i]}</span>
            </div>`;
  }).join("");
  return `<p class="texte-muet">Touche les étapes dans l'ordre chronologique (1, 2, 3…).</p>
          <div class="liste-ordre">${items}</div>`;
}
function toggleEtapeOrdre(i){
  if(etat.reponseValidee) return;
  const sel = etat.selection;
  const pos = sel.ordreChoisi.indexOf(i);
  if(pos>=0) sel.ordreChoisi.splice(pos,1);
  else if(sel.ordreChoisi.length < sel.ordreAffiche.length) sel.ordreChoisi.push(i);
  rendre();
}

function rendreActions(q){
  if(!etat.reponseValidee){
    const peutValider = peutValiderReponse(q);
    return `<button class="bouton" ${peutValider?"":"disabled"} onclick="validerReponse()">Valider</button>`;
  }
  const dernier = etat.indexCourant === etat.questions.length - 1;
  return `<button class="bouton" onclick="questionSuivante()">${dernier ? "Voir mes résultats" : "Question suivante"} →</button>`;
}

function peutValiderReponse(q){
  const sel = etat.selection;
  if(q.type === "qcm_unique") return sel.choix !== null;
  if(q.type === "qcm_multiple") return sel.choix.length > 0;
  if(q.type === "vrai_faux") return sel.choix !== null;
  if(q.type === "appariement") return Object.keys(sel.paires).length === q.paires.length;
  if(q.type === "ordre_chrono") return sel.ordreChoisi.length === q.etapes.length;
  return false;
}

function estReponseCorrecte(q){
  const sel = etat.selection;
  if(q.type === "qcm_unique") return sel.choix === q.reponseCorrecte;
  if(q.type === "qcm_multiple"){
    const a = [...sel.choix].sort().join(",");
    const b = [...q.reponsesCorrectes].sort().join(",");
    return a === b;
  }
  if(q.type === "vrai_faux") return sel.choix === q.reponse;
  if(q.type === "appariement") return q.paires.every((_,i)=> sel.paires[i] === i);
  if(q.type === "ordre_chrono") return q.etapes.every((_,i)=> sel.ordreChoisi[i] === i);
  return false;
}

function validerReponse(){
  const q = questionActuelle();
  if(!peutValiderReponse(q) || etat.reponseValidee) return;
  const correct = estReponseCorrecte(q);
  etat.reponseValidee = true;

  majStats(q.id, correct);
  ajouterVu(q.niveau, q.culture, q.id);
  if(correct){
    retirerErreur(q.niveau, q.culture, q.id);
    etat.score++; etat.streak++; etat.bonnesReponses++;
    if(etat.streak > etat.streakMax) etat.streakMax = etat.streak;
  } else {
    ajouterErreur(q.niveau, q.culture, q.id);
    etat.streak = 0;
  }

  rendre();
  if(correct) lancerConfettisLegers();
}

function questionSuivante(){
  if(etat.indexCourant === etat.questions.length - 1){
    etat.vue = "resultats";
    rendre();
    return;
  }
  etat.indexCourant++;
  etat.reponseValidee = false;
  etat.selection = null;
  rendre();
}

function rendreFeedback(q, correct){
  const capaciteLibelle = REFERENTIEL[q.niveau].capacites[q.capacite_referentiel] || q.capacite_referentiel;
  return `<div class="zone-feedback ${correct?"ok":"ko"}">
    <div class="titre-feedback">${correct ? "✅ " + q.feedback_ok : "❌ " + q.feedback_ko}</div>
    <div class="explication">${q.explication}</div>
    <div class="capacite-travaillee">📘 Capacité travaillée : ${capaciteLibelle}</div>
  </div>`;
}

function libelleType(t){
  return { qcm_unique:"QCM", qcm_multiple:"QCM à réponses multiples", appariement:"Appariement", vrai_faux:"Vrai / Faux", ordre_chrono:"Ordre chronologique" }[t] || t;
}
function libelleDifficulte(d){
  return { facile:"🟢 Facile", moyen:"🟠 Moyen", difficile:"🔴 Difficile" }[d] || d;
}

function afficherToast(msg){
  const div = document.createElement("div");
  div.className = "toast";
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 3200);
}

function lancerConfettisLegers(){
  const zone = document.getElementById("zone-confettis");
  const emojis = ["🌾","🌟","✅","🌱","🎉"];
  for(let i=0;i<10;i++){
    const s = document.createElement("span");
    s.className = "confetti";
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = Math.random()*100 + "vw";
    s.style.animationDelay = (Math.random()*0.3)+"s";
    zone.appendChild(s);
    setTimeout(()=>s.remove(), 1900);
  }
}

/* =====================================================================
   10. ÉCRAN RÉSULTATS DE FIN DE SESSION
   ===================================================================== */
function rendreResultats(){
  const total = etat.questions.length;
  const pct = total>0 ? Math.round((etat.score/total)*100) : 0;
  const badge = calculerBadge(etat.niveau, etat.culture);

  app.innerHTML = `
    <div class="carte centre">
      <h1>${messageResultat(pct)}</h1>
      <div class="gros-score">${etat.score} / ${total}</div>
      <div class="sous-score">${pct}% de bonnes réponses · série max 🔥 ${etat.streakMax}</div>
      ${badge ? `<div class="badge-medaille ${badge.tier}" style="margin:1rem auto 0; width:110px;">
        <div class="cercle">${badge.icone}</div>
        <div>${badge.libelle}</div>
      </div>` : ""}
      <div style="display:flex; flex-direction:column; gap:.6rem; margin-top:1.4rem;">
        <button class="bouton" onclick="demarrerSession(false)">🔁 Nouvelle session</button>
        <button class="bouton secondaire" onclick="allerAccueil()">🏠 Accueil</button>
        <button class="bouton fantome" onclick="allerVersStats()">📊 Voir mes stats</button>
      </div>
    </div>
  `;
}
function messageResultat(pct){
  if(pct === 100) return "Score parfait ! 🏆";
  if(pct >= 80) return "Excellent travail ! 💪";
  if(pct >= 60) return "Bien joué, continue ! 🌱";
  if(pct >= 40) return "Pas mal, on progresse ! 📚";
  return "On révise et on revient ! 🔍";
}
function calculerBadge(niveau, culture){
  const banque = banqueDuCouple(niveau, culture);
  const stats = getStats();
  let vu=0, correct=0;
  banque.forEach(q=>{ const s = stats[q.id]; if(s){ vu += s.vu; correct += s.correct; } });
  if(vu < 10) return null;
  const taux = correct/vu;
  if(taux >= 0.9) return {tier:"or", icone:"🥇", libelle:"Maîtrise Or"};
  if(taux >= 0.75) return {tier:"argent", icone:"🥈", libelle:"Maîtrise Argent"};
  if(taux >= 0.5) return {tier:"bronze", icone:"🥉", libelle:"Maîtrise Bronze"};
  return null;
}

/* =====================================================================
   11. ÉCRAN "MES STATS"
   ===================================================================== */
function statsParCulture(){
  const stats = getStats();
  return CULTURES_DISPONIBLES.map(culture=>{
    let vu=0, correct=0;
    ["CAP","BACPRO"].forEach(niveau=>{
      banqueDuCouple(niveau, culture).forEach(q=>{
        const s = stats[q.id]; if(s){ vu+=s.vu; correct+=s.correct; }
      });
    });
    return { culture, vu, correct, taux: vu>0 ? Math.round((correct/vu)*100) : null };
  });
}
function statsParCapacite(){
  const stats = getStats();
  const parCap = {};
  QUESTION_BANK.forEach(q=>{
    const s = stats[q.id];
    if(!s) return;
    const cle = `${q.niveau}::${q.capacite_referentiel}`;
    if(!parCap[cle]) parCap[cle] = { niveau:q.niveau, capacite:q.capacite_referentiel, vu:0, correct:0 };
    parCap[cle].vu += s.vu;
    parCap[cle].correct += s.correct;
  });
  return Object.values(parCap).map(c=>({...c, taux: c.vu>0 ? Math.round((c.correct/c.vu)*100) : 0}));
}
function toutesLesErreurs(){
  const res = [];
  CULTURES_DISPONIBLES.forEach(culture=>{
    ["CAP","BACPRO"].forEach(niveau=>{
      getErreurs(niveau, culture).forEach(id=>{
        const q = QUESTION_BANK.find(qq=>qq.id===id);
        if(q) res.push(q);
      });
    });
  });
  return res;
}

function rendreStats(){
  const onglets = [
    {id:"cultures", label:"Par culture"},
    {id:"capacites", label:"Par capacité"},
    {id:"erreurs", label:"Erreurs à revoir"}
  ];
  const barreOnglets = onglets.map(o=>
    `<button class="${etat.ongletStats===o.id?'actif':''}" onclick="changerOngletStats('${o.id}')">${o.label}</button>`
  ).join("");

  let contenu = "";
  if(etat.ongletStats === "cultures"){
    const lignes = statsParCulture();
    if(!lignes.some(l=>l.vu>0)){
      contenu = `<div class="vide-etat">Pas encore de données. Lance une première session ! 🚀</div>`;
    } else {
      contenu = lignes.map(l=>`
        <div class="ligne-stat">
          <span>${nomCulture(l.culture)}</span>
          <div class="mini-barre"><div style="width:${l.taux ?? 0}%"></div></div>
          <span class="badge-pill ${l.taux===null?'gris':''}">${l.taux===null ? "—" : l.taux+"%"}</span>
        </div>`).join("");
    }
  } else if(etat.ongletStats === "capacites"){
    const lignes = statsParCapacite();
    if(lignes.length===0){
      contenu = `<div class="vide-etat">Pas encore de données par capacité.</div>`;
    } else {
      contenu = lignes.map(l=>`
        <div class="ligne-stat">
          <span>${(REFERENTIEL[l.niveau] && REFERENTIEL[l.niveau].capacites[l.capacite]) || l.capacite}</span>
          <div class="mini-barre"><div style="width:${l.taux}%"></div></div>
          <span class="badge-pill">${l.taux}%</span>
        </div>`).join("");
    }
  } else if(etat.ongletStats === "erreurs"){
    const erreurs = toutesLesErreurs();
    if(erreurs.length===0){
      contenu = `<div class="vide-etat">Aucune erreur en attente. Bravo, continue comme ça ! 🎉</div>`;
    } else {
      contenu = `<p class="texte-muet">${erreurs.length} question(s) à retravailler. Retourne sur la culture concernée à l'accueil et lance le mode Rattrapage.</p>` +
        erreurs.map(q=>`<div class="ligne-stat"><span class="badge-pill gris">${nomCulture(q.culture)} · ${q.niveau}</span><span class="texte-muet" style="text-align:right; flex:1;">${q.enonce.length>70 ? q.enonce.slice(0,70)+"…" : q.enonce}</span></div>`).join("");
    }
  }

  app.innerHTML = `
    <button class="bouton fantome bouton-petit" style="margin-bottom:1rem;" onclick="allerAccueil()">← Retour</button>
    <h1>Mes stats 📊</h1>
    <div class="onglets">${barreOnglets}</div>
    <div class="carte">${contenu}</div>
  `;
}
function changerOngletStats(id){ etat.ongletStats = id; rendre(); }

/* =====================================================================
   12. DÉMARRAGE
   ===================================================================== */
rendre();
</script>
